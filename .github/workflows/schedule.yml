name: Daily Crypto Report Update

on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 (KST)
  workflow_dispatch:

# [추가됨 ✨] 깃허브 봇이 저장소에 파일을 쓸 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  update-sheet:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' 

    - name: 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 구글 시크릿 키 파일 생성
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_CREDENTIALS" > secrets.json

    - name: 메인 스크립트 실행 (데이터 수집 및 리포트 생성)
      run: |
        python main.py

    # [추가됨 ✨] 새로 생성된 리포트 폴더를 깃허브에 자동 커밋 & 푸시
    - name: 생성된 리포트 깃허브에 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/
        # 변경사항이 있을 때만 커밋하도록 예외 처리 (에러 방지)
        git diff --quiet && git diff --staged --quiet || (git commit -m "📝 일일 암호화폐 AI 리포트 자동 생성" && git push)
