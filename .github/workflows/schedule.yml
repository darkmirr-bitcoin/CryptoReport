name: Daily Crypto Report Update

on:
  schedule:
    # 깃허브 서버 병목을 피하기 위해 오전 9시 정각 대신 8시 43분(KST)으로 설정
    - cron: '43 23 * * *'
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-sheet-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' 

    - name: 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 구글 시크릿 키 파일 생성
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_CREDENTIALS" > secrets.json

    - name: 메인 스크립트 실행 (데이터 수집, 리포트 생성, 텔레그램 전송)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py

    - name: 생성된 리포트 깃허브에 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -d "reports" ]; then
          git add reports/ index.html style.scss
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 일일 암호화폐 AI 리포트 및 웹페이지 자동 생성" && git push)
        else
          echo "📭 생성된 리포트가 없으므로 커밋을 건너뜁니다."
        fi
