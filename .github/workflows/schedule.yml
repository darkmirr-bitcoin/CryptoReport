name: Daily Crypto Report Update

on:
  schedule:
    # UTC 시간 기준 0시 0분 (한국 시간 KST 오전 9시 0분에 해당)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼

# 깃허브 봇이 저장소에 파일을 쓸 수 있도록 권한 부여
permissions:
  contents: write

jobs:
  update-sheet-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' 

    - name: 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 구글 시크릿 키 파일 생성
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_CREDENTIALS" > secrets.json

    - name: 메인 스크립트 실행 (데이터 수집 및 리포트 생성)
      run: |
        python main.py

    - name: 생성된 리포트 깃허브에 커밋 및 푸시
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
       # reports 폴더(MD만 있음)와 최상위 웹 파일들을 같이 커밋
        if [ -d "reports" ]; then
          git add reports/ index.html style.scss style.css
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 일일 리포트 및 웹페이지 업데이트" && git push)
        else
          echo "📭 생성된 리포트가 없으므로 커밋을 건너뜁니다."
        fi
